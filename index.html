<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brought to you by Neuromancer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07080d;
      --fg: #eef3ff;
      --muted: #8ea0c5;
      --glow: #8b5cf6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% 35%, rgba(139, 92, 246, 0.25), transparent 34rem),
        radial-gradient(circle at 80% 80%, rgba(14, 165, 233, 0.15), transparent 28rem),
        var(--bg);
      color: var(--fg);
    }

    main {
      text-align: center;
      max-width: 52rem;
    }

    p.kicker {
      margin: 0 0 1rem;
      color: var(--muted);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-size: clamp(0.75rem, 2vw, 0.95rem);
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 7rem);
      line-height: 0.95;
      text-wrap: balance;
      text-shadow: 0 0 2rem rgba(139, 92, 246, 0.55);
    }
  </style>
</head>
<body>
  <main aria-label="Neuromancer landing page">
    <p class="kicker">signal received</p>
    <h1>Brought to you by Neuromancer</h1>
  </main>
</body>
</html>
